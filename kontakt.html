</head>
<body>
<nav class="navbar">

  <span></span>

<section class="hero">
  <img src="images/hero.jpg" alt="Bil som tvättas" class="hero-image">
  <div class="hero-text">
    <h1>Kontakta oss</h1>
  </div>
</section>

<section class="kontakt-section">
  <div class="kontakt-grid">
    <div class="kontakt-form-wrapper">
      <h2>Skicka ett meddelande</h2>
      <form id="kontakt-form">
        <label for="k-namn">Namn</label>
        <input type="text" id="k-namn" required>

        <label for="k-epost">E-post</label>
        <input type="email" id="k-epost" required>
        <span class="felmeddelande" id="epost-fel"></span>

        <label for="k-meddelande">Meddelande</label>
        <textarea id="k-meddelande" rows="5" required></textarea>

        <button type="submit" class="cta-button">Skicka</button>
      </form>
    </div>

    <div class="karta-wrapper">
      <iframe
        src="https://maps.google.com/maps?q=Storgatan+12,+V%C3%A4ster%C3%A5s&output=embed"
        width="100%"
        height="100%"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
      </iframe>
    </div>
  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
